name: Trigger auto deployment for sentinel-backend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/sentinel-backend-AutoDeployTrigger-4d4384d3-b1f1-4bbb-9005-10da28770b8f.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SENTINELBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.SENTINELBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SENTINELBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}backend
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: sentinelacr1.azurecr.io
          registryUsername: ${{ secrets.SENTINELBACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.SENTINELBACKEND_REGISTRY_PASSWORD }}
          containerAppName: sentinel-backend
          resourceGroup: sentinel-omni-rg
          imageToBuild: sentinelacr1.azurecr.io/sentinel-backend:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


