services:
  # ── SENTINEL OMNI: AI BACKEND ──
  - type: web
    name: sentinel-omni-backend
    env: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    plan: starter # ML processing (YOLO/LSTM) requires at least 512MB-1GB RAM
    healthCheckPath: /api/v1/auth/me # Requires Auth, but checks if app is responsive
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sentinel-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440

  # ── SENTINEL OMNI: REACT DASHBOARD ──
  - type: static_site
    name: sentinel-omni-dashboard
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: sentinel-omni-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: sentinel-db
    plan: free # Free tier Postgres for persistent alert storage
